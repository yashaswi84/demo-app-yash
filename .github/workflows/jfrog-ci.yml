name: JFrog Supply Chain CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_NAME: jfrog-supply-chain-demo
  BUILD_NUMBER: ${{ github.run_number }}
  IMAGE_NAME: demo-app-yash

jobs:
  build-push-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Normalize JFrog URL
        env:
          ARTIFACTORY_URL_RAW: ${{ secrets.ARTIFACTORY_URL }}
        run: |
          url="${ARTIFACTORY_URL_RAW%/}"
          case "$url" in
            http://*|https://*) ;;
            *) url="https://$url" ;;
          esac
          echo "::add-mask::$url"
          echo "JF_URL=$url" >> "$GITHUB_ENV"

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_USER: ${{ secrets.ARTIFACTORY_USERNAME }}
          JF_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Verify JFrog connection
        run: jf rt ping

      - name: Configure npm resolver
        working-directory: frontend
        run: jf npm-config --repo-resolve="${{ secrets.REPO_PREFIX }}-npm-virtual"

      - name: Build frontend
        working-directory: frontend
        run: |
          jf npm ci --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          npm run build

      - name: Configure Maven resolver
        working-directory: backend
        run: jf mvn-config --repo-resolve-releases="${{ secrets.REPO_PREFIX }}-maven-virtual" --repo-resolve-snapshots="${{ secrets.REPO_PREFIX }}-maven-virtual"

      - name: Build backend
        working-directory: backend
        run: jf mvn clean package --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

      - name: Prepare image tag
        run: echo "IMAGE_TAG=${{ secrets.DOCKER_REGISTRY }}/${{ secrets.REPO_PREFIX }}-docker-local/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Docker login to Artifactory
        run: jf docker login "${{ secrets.DOCKER_REGISTRY }}" --username "${{ secrets.ARTIFACTORY_USERNAME }}" --password "${{ secrets.ARTIFACTORY_PASSWORD }}"

      - name: Build Docker image
        run: jf docker build -t "$IMAGE_TAG" .

      - name: Push Docker image to Artifactory
        run: jf docker push "$IMAGE_TAG" --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

      - name: Publish JFrog build info
        run: jf rt build-publish "$BUILD_NAME" "$BUILD_NUMBER" --collect-env --collect-git-info

      - name: Xray build scan
        run: jf build-scan "$BUILD_NAME" "$BUILD_NUMBER"
