name: JFrog Supply Chain CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_NAME: jfrog-supply-chain-demo
  BUILD_NUMBER: ${{ github.run_number }}
  IMAGE_NAME: demo-app-yash

jobs:
  build-push-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Normalize JFrog inputs
        env:
          ARTIFACTORY_URL_RAW: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USERNAME_RAW: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD_RAW: ${{ secrets.ARTIFACTORY_PASSWORD }}
          DOCKER_REGISTRY_RAW: ${{ secrets.DOCKER_REGISTRY }}
          REPO_PREFIX_RAW: ${{ secrets.REPO_PREFIX }}
        run: |
          url="${ARTIFACTORY_URL_RAW#ARTIFACTORY_URL=}"
          url="${url%/}"
          case "$url" in
            http://*|https://*) ;;
            *) url="https://$url" ;;
          esac

          user="${ARTIFACTORY_USERNAME_RAW#ARTIFACTORY_USERNAME=}"
          password="${ARTIFACTORY_PASSWORD_RAW#ARTIFACTORY_PASSWORD=}"
          docker_registry="${DOCKER_REGISTRY_RAW#DOCKER_REGISTRY=}"
          docker_registry="${docker_registry#http://}"
          docker_registry="${docker_registry#https://}"
          docker_registry="${docker_registry%/}"
          repo_prefix="${REPO_PREFIX_RAW#REPO_PREFIX=}"

          echo "::add-mask::$url"
          echo "::add-mask::$user"
          echo "::add-mask::$password"
          echo "::add-mask::$docker_registry"
          echo "JF_URL=$url" >> "$GITHUB_ENV"
          case "$password" in
            eyJ*)
              payload="${password#*.}"
              payload="${payload%%.*}"
              token_user="$(node -e 'const payload = process.argv[1].replace(/-/g, "+").replace(/_/g, "/"); const sub = JSON.parse(Buffer.from(payload, "base64").toString("utf8")).sub || ""; const marker = "/users/"; console.log(sub.includes(marker) ? sub.slice(sub.lastIndexOf(marker) + marker.length) : "");' "$payload")"
              if [ -n "$token_user" ]; then
                user="$token_user"
              fi
              echo "::add-mask::$user"
              echo "ARTIFACTORY_USERNAME_VALUE=$user" >> "$GITHUB_ENV"
              echo "JF_ACCESS_TOKEN=$password" >> "$GITHUB_ENV"
              ;;
            *)
              echo "ARTIFACTORY_USERNAME_VALUE=$user" >> "$GITHUB_ENV"
              echo "JF_USER=$user" >> "$GITHUB_ENV"
              echo "JF_PASSWORD=$password" >> "$GITHUB_ENV"
              ;;
          esac
          echo "DOCKER_REGISTRY_VALUE=$docker_registry" >> "$GITHUB_ENV"
          echo "REPO_PREFIX_VALUE=$repo_prefix" >> "$GITHUB_ENV"

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Verify JFrog connection
        run: jf rt ping

      - name: Ensure Artifactory demo repositories
        run: |
          ensure_repo() {
            template="$1"
            if jf rt repo-create "$template" --vars "repoPrefix=${REPO_PREFIX_VALUE}"; then
              echo "Created repository from $template"
            else
              jf rt repo-update "$template" --vars "repoPrefix=${REPO_PREFIX_VALUE}"
              echo "Updated repository from $template"
            fi
          }

          ensure_repo .jfrog/repositories/npm-remote.json
          ensure_repo .jfrog/repositories/npm-virtual.json
          ensure_repo .jfrog/repositories/maven-remote.json
          ensure_repo .jfrog/repositories/maven-virtual.json
          ensure_repo .jfrog/repositories/docker-local.json

      - name: Configure npm resolver
        working-directory: frontend
        run: jf npm-config --repo-resolve="${REPO_PREFIX_VALUE}-npm-virtual"

      - name: Build frontend
        working-directory: frontend
        run: |
          mkdir -p "$HOME/.npm/_cacache"
          jf npm ci --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          npm run build

      - name: Configure Maven resolver
        working-directory: backend
        run: jf mvn-config --repo-resolve-releases="${REPO_PREFIX_VALUE}-maven-virtual" --repo-resolve-snapshots="${REPO_PREFIX_VALUE}-maven-virtual"

      - name: Build backend
        working-directory: backend
        run: jf mvn clean package --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

      - name: Prepare image tag
        run: echo "IMAGE_TAG=${DOCKER_REGISTRY_VALUE}/${REPO_PREFIX_VALUE}-docker-local/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Docker login to Artifactory
        run: |
          if [ -n "${JF_ACCESS_TOKEN:-}" ]; then
            jf docker login "$DOCKER_REGISTRY_VALUE" --username "$ARTIFACTORY_USERNAME_VALUE" --password "$JF_ACCESS_TOKEN"
          else
            jf docker login "$DOCKER_REGISTRY_VALUE" --username "$JF_USER" --password "$JF_PASSWORD"
          fi

      - name: Build Docker image
        run: jf docker build -t "$IMAGE_TAG" .

      - name: Push Docker image to Artifactory
        run: jf docker push "$IMAGE_TAG" --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

      - name: Publish JFrog build info
        run: jf rt build-publish "$BUILD_NAME" "$BUILD_NUMBER" --collect-env --collect-git-info

      - name: Xray build scan
        run: jf build-scan "$BUILD_NAME" "$BUILD_NUMBER" --fail=false
